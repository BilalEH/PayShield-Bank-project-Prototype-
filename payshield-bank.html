<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayShield Bank — AI Fraud Detection System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap">
    <style>
        /* #f1f5f9 */
        /* #0b1120 */
        /* #d97706 */
        /* #ef4444 */


        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', system-ui, sans-serif; 
            background: #0b1120;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-grid {
            background-image: 
                linear-gradient(rgba(21, 101, 192, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(21, 101, 192, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, #1565c026, transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, #e539351a, transparent),
                radial-gradient(ellipse 60% 40% at 0% 100%, #2e7d321a, transparent);
            pointer-events: none;
            z-index: 0;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #d97706, #a95c05); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #d97706, #d97706); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes data-flow { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
        @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(21, 101, 192, 0.3); } 50% { box-shadow: 0 0 40px #1565c099; } }
        @keyframes border-glow { 0%, 100% { border-color: rgba(21, 101, 192, 0.3); } 50% { border-color: rgba(21, 101, 192, 0.8); } }
        
        .glass { background: rgba(13, 33, 55, 0.6); backdrop-filter: blur(20px); border: 1px solid #d9770647}
        .glass-card { background: rgba(13, 33, 55, 0.4); backdrop-filter: blur(10px); border: 1px solid #d977061a; }
        
        .btn-primary { background: linear-gradient(135deg, #1565C0, #0D47A1); transition: all 0.3s ease; }
        .btn-primary:hover { background: linear-gradient(135deg, #1976D2, #1565C0); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(21, 101, 192, 0.4); }
        
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .mobile-menu { transform: translateX(-100%); transition: transform 0.3s ease; }
        .mobile-menu.open { transform: translateX(0); }
        
        .table-row:hover { background: rgba(21, 101, 192, 0.1); }
        
        .toast-enter { animation: slideInRight 0.3s ease-out; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .progress-bar { transition: width 0.5s ease-out; }
        
        .plan-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(21, 101, 192, 0.3); }
        
        .usage-meter { background: linear-gradient(90deg, #1565C0, #0D47A1); transition: width 0.5s ease-out; }
        
        .api-key { font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }
    </style>
</head>
<body class="bg-[#030712] text-white">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        
        const RISKY_COUNTRIES = ['Nigeria', 'Roumanie', 'Chine', 'Russie', 'Ukraine', 'Pakistan', 'Iran', 'Corée du Nord'];
        const ALL_COUNTRIES = ['France', 'Maroc', 'Espagne', 'Belgique', 'Allemagne', 'Italie', 'Portugal', 'Pays-Bas', 'Suisse', 'USA', 'UK', 'Canada', 'Japon', 'Australie', 'Nigeria', 'Roumanie', 'Chine', 'Russie', 'Ukraine', 'Pakistan'];
        const CLIENT_NAMES = [
            'Mohammed Alami', 'Sofia Berrada', 'Jean Dupont', 'Karim Tazi', 'Anna Kovacs',
            'Pierre Martin', 'Fatima Zahra Idrissi', 'Liu Wei', 'Carlos Mendez', 'Youssef Benali',
            'Marie Leclerc', 'Omar Diallo', 'Elena Popescu', 'Ahmed Tahiri', 'Sara Chraibi',
            'Nicolas Bernard', 'Aicha Moussaoui', 'David Rodriguez', 'Hamid Benjelloun',
            'Camille Rousseau', 'Nadia Filali', 'Thomas Klein', 'Laila Bensalem', 'Marc Fontaine'
        ];
        
        const generateId = () => `TXN-${Math.random().toString(36).substr(2, 8).toUpperCase()}`;
        
        const generateTransaction = (id) => {
            const country = ALL_COUNTRIES[Math.floor(Math.random() * ALL_COUNTRIES.length)];
            const isRiskyCountry = RISKY_COUNTRIES.includes(country);
            const failedAttempts = Math.floor(Math.random() * 8);
            const amount = Math.floor(Math.random() * 8740) + 12;
            const hour = Math.floor(Math.random() * 24);
            const minute = Math.floor(Math.random() * 60);
            
            let riskScore = 10 + Math.floor(Math.random() * 20);
            if (failedAttempts > 2) riskScore += failedAttempts * 8;
            if (amount > 2000) riskScore += 15;
            if (isRiskyCountry) riskScore += 25;
            if (failedAttempts > 5) riskScore += 20;
            riskScore = Math.min(100, riskScore);
            
            let riskLevel = 'Faible';
            if (riskScore > 70) riskLevel = 'Élevé';
            else if (riskScore > 30) riskLevel = 'Moyen';
            
            let status = 'Validé';
            if (riskLevel === 'Moyen') status = 'Vérification';
            else if (riskLevel === 'Élevé') status = 'Bloqué';
            
            return {
                id: id || generateId(),
                client: CLIENT_NAMES[Math.floor(Math.random() * CLIENT_NAMES.length)],
                amount,
                country,
                time: `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`,
                hour,
                failedAttempts,
                riskScore,
                riskLevel,
                status,
                isRiskyCountry,
                timestamp: Date.now() - Math.random() * 86400000
            };
        };
        
        const generateInitialData = (count = 50) => {
            const data = [];
            for (let i = 0; i < count; i++) {
                data.push(generateTransaction());
            }
            return data.sort((a, b) => b.timestamp - a.timestamp);
        };
        
        const analyzeTransaction = (transaction) => {
            const factors = [];
            let score = 15;
            
            if (transaction.failedAttempts > 2) {
                score += transaction.failedAttempts * 10;
                factors.push({ id: 1, name: 'Tentatives échouées multiples', severity: 'high', desc: `${transaction.failedAttempts} tentatives échouées` });
            }
            
            if (transaction.amount > 2000) {
                score += 15;
                factors.push({ id: 2, name: 'Montant inhabituel', severity: transaction.amount > 5000 ? 'high' : 'medium', desc: `Montant de ${transaction.amount}€ dépasse le seuil` });
            }
            
            if (transaction.isRiskyCountry) {
                score += 28;
                factors.push({ id: 3, name: 'Origine géographique à risque', severity: 'high', desc: `Pays: ${transaction.country}` });
            }
            
            const hour = transaction.hour;
            if (hour < 6 || hour > 22) {
                score += 12;
                factors.push({ id: 4, name: 'Transaction hors horaires', severity: 'medium', desc: `Heure: ${transaction.time}` });
            }
            
            if (transaction.amount > 3000 && transaction.isRiskyCountry) {
                score += 20;
                factors.push({ id: 5, name: 'Combinaison à risque', severity: 'critical', desc: 'Montant élevé + pays à risque' });
            }
            
            score = Math.min(100, score);
            
            let riskLevel = 'Faible';
            if (score > 70) riskLevel = 'Élevé';
            else if (score > 30) riskLevel = 'Moyen';
            
            let recommendation = '';
            if (score <= 30) recommendation = 'auto';
            else if (score <= 60) recommendation = 'review';
            else recommendation = 'block';
            
            return { score, riskLevel, factors, recommendation, timestamp: new Date().toISOString() };
        };
        
        const CircularProgress = ({ percentage, size = 120, strokeWidth = 8, color }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;
            
            return (
                <svg width={size} height={size} className="transform -rotate-90">
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(21, 101, 192, 0.2)" strokeWidth={strokeWidth} />
                    <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color || (percentage > 70 ? '#E53935' : percentage > 30 ? '#FB8C00' : '#2E7D32')} strokeWidth={strokeWidth} strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s ease-out' }} />
                </svg>
            );
        };
        
        const NeuralNetwork = () => {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const nodes = [];
                const numNodes = 25;
                
                for (let i = 0; i < numNodes; i++) {
                    nodes.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        radius: Math.random() * 3 + 1
                    });
                }
                
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    nodes.forEach((node, i) => {
                        node.x += node.vx;
                        node.y += node.vy;
                        
                        if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
                        if (node.y < 0 || node.y > canvas.height) node.vy *= -1;
                        
                        nodes.forEach((other, j) => {
                            if (i === j) return;
                            const dx = other.x - node.x;
                            const dy = other.y - node.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist < 150) {
                                ctx.beginPath();
                                ctx.moveTo(node.x, node.y);
                                ctx.lineTo(other.x, other.y);
                                ctx.strokeStyle = `rgba(21, 101, 192, ${0.3 - dist/500})`;
                                ctx.stroke();
                            }
                        });
                        
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                        ctx.fillStyle = '#d97706';
                        ctx.fill();
                    });
                    
                    requestAnimationFrame(animate);
                };
                
                animate();
            }, []);
            
            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none opacity-30 z-0" />;
        };
        
        const Sidebar = ({ currentView, setCurrentView, isOpen, setIsOpen }) => {
            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: '◈' },
                { id: 'transactions', label: 'Transactions', icon: '◇' },
                { id: 'analyser', label: 'IA Analyser', icon: '◆' },
                { id: 'alertes', label: 'Alertes', icon: '◉' },
                { id: 'billing', label: 'Abonnement', icon: '◐' },
                { id: 'api', label: 'Intégration', icon: '⚡' }
            ];
            
            return (
                <>
                    <button onClick={() => setIsOpen(!isOpen)} className="fixed top-4 left-4 z-50 p-2 rounded-lg bg-[#a95c05] border border-[#d97706] md:hidden">
                        <span className="text-xl">{isOpen ? '✕' : '☰'}</span>
                    </button>
                    
                    {isOpen && <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsOpen(false)} />}
                    
                    <aside className={`fixed left-0 top-0 h-full w-64 bg-[#0A1628]/95 backdrop-blur-xl border-r border-[#0D2137]/20 z-40 transform transition-transform duration-300 ${isOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0`}>
                        <div className="p-6 border-b bg-[#f1f5f9]">
                            <img src="applogo.png" alt="PayShield Logo" className="" />
                        </div>
                        
                        <nav className="p-4 space-y-2">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => { setCurrentView(item.id); setIsOpen(false); }} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition-all ${currentView === item.id ? 'bg-gradient-to-r from-[#ef4444] to-[#d97706] text-white shadow-lg shadow-[#d97706]/30' : 'text-gray-400 hover:bg-[#d97706]/30 hover:text-white'}`}>
                                    <span className="text-lg">{item.icon}</span>
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="absolute bottom-0 left-0 right-0 p-4 border-t border-[#d97706]/20">
                            <div className="glass-card rounded-xl p-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                    <span className="text-xs text-gray-400">IA Active</span>
                                </div>
                                <p className="text-xs text-gray-500">v2.0.0 • Prototype</p>
                            </div>
                        </div>
                    </aside>
                </>
            );
        };
        
        const KPICard = ({ title, value, icon, color, trend }) => (
            <div className="glass-card rounded-2xl p-5 hover:border-[#d97706]/40 transition-all duration-300 group">
                <div className="flex items-start justify-between">
                    <div>
                        <p className="text-sm text-gray-400 mb-1">{title}</p>
                        <p className="text-3xl font-bold" style={{ color }}>{value}</p>
                    </div>
                    <div className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ backgroundColor: `${color}20` }}>
                        <span className="text-2xl">{icon}</span>
                    </div>
                </div>
                {trend && (
                    <div className="mt-3 flex items-center gap-1 text-xs">
                        <span className={trend > 0 ? 'text-green-400' : 'text-red-400'}>
                            {trend > 0 ? '↑' : '↓'} {Math.abs(trend)}%
                        </span>
                        <span className="text-gray-500">vs hier</span>
                    </div>
                )}
            </div>
        );
        
        const StatusBadge = ({ status }) => {
            const config = {
                'Validé': { bg: '#2E7D32', color: 'text-green-400', icon: '✓' },
                'Vérification': { bg: '#FB8C00', color: 'text-orange-400', icon: '⚠' },
                'Bloqué': { bg: '#E53935', color: 'text-red-400', icon: '✕' },
                'Faible': { bg: '#2E7D32', color: 'text-green-400', icon: '●' },
                'Moyen': { bg: '#FB8C00', color: 'text-orange-400', icon: '●' },
                'Élevé': { bg: '#E53935', color: 'text-red-400', icon: '●' }
            };
            const c = config[status] || config['Faible'];
            
            return (
                <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium ${c.color}`} style={{ backgroundColor: `${c.bg}20` }}>
                    <span>{c.icon}</span>
                    {status}
                </span>
            );
        };
        
        const TransactionModal = ({ transaction, isOpen, onClose }) => {
            if (!isOpen || !transaction) return null;
            
            const analysis = useMemo(() => analyzeTransaction(transaction), [transaction]);
            
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative glass rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto animate-[slideInRight_0.3s_ease-out]">
                        <div className="p-6">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h3 className="text-xl font-bold">Analyse IA</h3>
                                    <p className="text-sm text-gray-400">{transaction.id}</p>
                                </div>
                                <button onClick={onClose} className="w-10 h-10 rounded-xl bg-[#0D2137] flex items-center justify-center hover:bg-[#0D2137] transition-colors">✕</button>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className="bg-[#0D2137] rounded-xl p-4">
                                    <p className="text-xs text-gray-400 mb-1">Client</p>
                                    <p className="font-medium">{transaction.client}</p>
                                </div>
                                <div className="bg-[#0D2137] rounded-xl p-4">
                                    <p className="text-xs text-gray-400 mb-1">Montant</p>
                                    <p className="font-medium">{transaction.amount}€</p>
                                </div>
                                <div className="bg-[#0D2137] rounded-xl p-4">
                                    <p className="text-xs text-gray-400 mb-1">Pays</p>
                                    <p className="font-medium">{transaction.country}</p>
                                </div>
                                <div className="bg-[#0D2137] rounded-xl p-4">
                                    <p className="text-xs text-gray-400 mb-1">Heure</p>
                                    <p className="font-medium">{transaction.time}</p>
                                </div>
                            </div>
                            
                            <div className="flex justify-center mb-6">
                                <div className="relative">
                                    <CircularProgress percentage={analysis.score} size={140} strokeWidth={10} />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="text-3xl font-bold">{analysis.score}</span>
                                        <span className="text-xs text-gray-400">risque</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mb-6">
                                <h4 className="font-medium mb-3">Facteurs de risque détectés</h4>
                                <div className="space-y-2">
                                    {analysis.factors.map(factor => (
                                        <div key={factor.id} className={`flex items-center gap-3 p-3 rounded-xl ${factor.severity === 'critical' ? 'bg-red-500/20 border border-red-500/30' : factor.severity === 'high' ? 'bg-orange-500/20 border border-orange-500/30' : 'bg-yellow-500/20 border border-yellow-500/30'}`}>
                                            <span className={`w-2 h-2 rounded-full ${factor.severity === 'critical' ? 'bg-red-500' : factor.severity === 'high' ? 'bg-orange-500' : 'bg-yellow-500'}`}></span>
                                            <div className="flex-1">
                                                <p className="text-sm font-medium">{factor.name}</p>
                                                <p className="text-xs text-gray-400">{factor.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className={`p-4 rounded-xl border ${analysis.recommendation === 'auto' ? 'border-green-500/30 bg-green-500/10' : analysis.recommendation === 'review' ? 'border-orange-500/30 bg-orange-500/10' : 'border-red-500/30 bg-red-500/10'}`}>
                                <p className="font-medium">
                                    {analysis.recommendation === 'auto' ? '✓ Transaction automatiquement validée' : analysis.recommendation === 'review' ? '⚠ Vérification manuelle requise' : '✕ Transaction bloquée'}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const DashboardView = ({ transactions }) => {
            const totalTransactions = transactions.length;
            const lowRisk = transactions.filter(t => t.riskLevel === 'Faible').length;
            const mediumRisk = transactions.filter(t => t.riskLevel === 'Moyen').length;
            const highRisk = transactions.filter(t => t.riskLevel === 'Élevé').length;
            const recentTx = transactions.slice(0, 8);
            
            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold mb-1">Dashboard</h2>
                            <p className="text-gray-400">Surveillance en temps réel via IA</p>
                        </div>
                        <div className="hidden md:flex items-center gap-2 px-4 py-2 glass rounded-xl">
                            <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span className="text-sm text-gray-400">Analyse active</span>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <KPICard title="Transactions" value={totalTransactions} icon="📊" color="text-white" trend={12} />
                        <KPICard title="Risque Faible" value={lowRisk} icon="✓" color="text-green-400" trend={5} />
                        <KPICard title="À Vérifier" value={mediumRisk} icon="⚠" color="text-orange-400" trend={-3} />
                        <KPICard title="Bloquées" value={highRisk} icon="✕" color="text-red-400" />
                    </div>
                    
                    <div className="grid lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 glass-card rounded-2xl overflow-hidden">
                            <div className="p-4 border-b border-[#0D2137]/20">
                                <h3 className="font-semibold">Transactions récentes</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead className="bg-[#0D2137]/50">
                                        <tr className="text-gray-400">
                                            <th className="text-left p-3">ID</th>
                                            <th className="text-left p-3">Client</th>
                                            <th className="text-right p-3">Montant</th>
                                            <th className="text-left p-3">Pays</th>
                                            <th className="text-center p-3">Score</th>
                                            <th className="text-center p-3">Statut</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {recentTx.map(tx => (
                                            <tr key={tx.id} className="border-t border-[#0D2137]/10 table-row">
                                                <td className="p-3 font-mono text-xs">{tx.id}</td>
                                                <td className="p-3">{tx.client}</td>
                                                <td className="p-3 text-right font-medium">{tx.amount}€</td>
                                                <td className="p-3">{tx.country}</td>
                                                <td className="p-3 text-center"><StatusBadge status={tx.riskLevel} /></td>
                                                <td className="p-3 text-center"><StatusBadge status={tx.status} /></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <div className="glass-card rounded-2xl p-6">
                            <h3 className="font-semibold mb-4">Distribution du risque</h3>
                            <div className="flex justify-center mb-6">
                                <div className="relative">
                                    <CircularProgress percentage={lowRisk / totalTransactions * 100} size={160} strokeWidth={12} color="#2E7D32" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="text-3xl font-bold">{Math.round(lowRisk / totalTransactions * 100)}%</span>
                                        <span className="text-xs text-gray-400">Sécurisé</span>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <div className="flex items-center justify-between"><div className="flex items-center gap-2"><span className="w-3 h-3 rounded bg-green-500"></span><span className="text-sm">Faible</span></div><span className="font-medium">{lowRisk}</span></div>
                                <div className="flex items-center justify-between"><div className="flex items-center gap-2"><span className="w-3 h-3 rounded bg-orange-500"></span><span className="text-sm">Moyen</span></div><span className="font-medium">{mediumRisk}</span></div>

                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="font-semibold mb-4">Historique de facturation</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-gray-400 border-b border-[#0D2137]/20">
                                        <th className="text-left p-3">Date</th>
                                        <th className="text-left p-3">Facture</th>
                                        <th className="text-right p-3">Montant</th>
                                        <th className="text-right p-3">Statut</th>
                                        <th className="text-right p-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {billingHistory.map(inv => (
                                        <tr key={inv.id} className="border-b border-[#d97706]/10">
                                            <td className="p-3">{inv.date}</td>
                                            <td className="p-3 font-mono text-xs">{inv.invoice}</td>
                                            <td className="p-3 text-right">{inv.amount}€</td>
                                            <td className="p-3 text-right"><span className="text-green-400">✓ {inv.status}</span></td>
                                            <td className="p-3 text-right">
                                                <button className="text-[#d97706] hover:underline text-sm">Télécharger</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };
        
        const APIView = () => {
            const [apiKey] = useState(`ps_live_${Math.random().toString(36).substr(2, 32)}`);
            const [showKey, setShowKey] = useState(false);
            const [webhooks, setWebhooks] = useState([
                { id: 1, url: 'https://api.bank.com/webhooks/fraud', events: ['transaction.blocked'], active: true },
                { id: 2, url: 'https://api.bank.com/webhooks/alert', events: ['alert.created'], active: true }
            ]);
            const [autoMode, setAutoMode] = useState(true);
            const [autoSettings, setAutoSettings] = useState({
                blockHighRisk: true,
                reviewMediumRisk: true,
                notifySlack: true,
                slackWebhook: 'https://hooks.slack.com/services/xxx'
            });
            
            return (
                <div className="space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold mb-1">Intégration API</h2>
                        <p className="text-gray-400">Configurez l'intégration automatique de PayShield</p>
                    </div>
                    
                    {/* API Key */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="font-semibold mb-4">Clé API</h3>
                        <div className="flex items-center gap-4">
                            <div className="flex-1 bg-[#0D2137] rounded-xl px-4 py-3">
                                <p className={`font-mono text-sm ${showKey ? '' : 'blur-sm'}`}>{showKey ? apiKey : '••••••••••••••••••••••••••••••'}</p>
                            </div>
                            <button onClick={() => setShowKey(!showKey)} className="px-4 py-2 bg-[#0D2137] border border-[#0D2137] rounded-xl hover:bg-[#0D2137] transition-all">
                                {showKey ? 'Masquer' : 'Afficher'}
                            </button>
                            <button className="px-4 py-2 bg-[#0D2137] rounded-xl hover:bg-[#5f36074d] transition-all">Regénérer</button>
                        </div>
                        <p className="text-xs text-gray-500 mt-2">Cette clé donne accès à votre compte. Ne la partagez pas.</p>
                    </div>
                    
                    {/* Auto Mode */}
                    <div className="glass-card rounded-2xl p-6">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h3 className="font-semibold">Mode automatique</h3>
                                <p className="text-sm text-gray-400">Laissez l'IA handles les transactions automatiquement</p>
                            </div>
                            <button 
                                onClick={() => setAutoMode(!autoMode)}
                                className={`w-14 h-8 rounded-full transition-all ${autoMode ? 'bg-green-500' : 'bg-[#0D2137]'}`}
                            >
                                <div className={`w-6 h-6 bg-white rounded-full transition-transform ${autoMode ? 'translate-x-6' : 'translate-x-1'}`}></div>
                            </button>
                        </div>
                        
                        <div className={`space-y-4 ${autoMode ? '' : 'opacity-50 pointer-events-none'}`}>
                            <div className="flex items-center justify-between p-3 bg-[#0D2137] rounded-xl">
                                <span>Bloquer automatiquement les risques élevés</span>
                                <input type="checkbox" checked={autoSettings.blockHighRisk} onChange={(e) => setAutoSettings(s => ({ ...s, blockHighRisk: e.target.checked }))} className="w-5 h-5 accent-[#0D2137]" />
                            </div>
                            <div className="flex items-center justify-between p-3 bg-[#0D2137] rounded-xl">
                                <span>Envoyer en révision les risques moyens</span>
                                <input type="checkbox" checked={autoSettings.reviewMediumRisk} onChange={(e) => setAutoSettings(s => ({ ...s, reviewMediumRisk: e.target.checked }))} className="w-5 h-5 accent-[#0D2137]" />
                            </div>
                            <div className="flex items-center justify-between p-3 bg-[#0D2137] rounded-xl">
                                <span>Notifier sur Slack</span>
                                <input type="checkbox" checked={autoSettings.notifySlack} onChange={(e) => setAutoSettings(s => ({ ...s, notifySlack: e.target.checked }))} className="w-5 h-5 accent-[#0D2137]" />
                            </div>
                        </div>
                    </div>
                    
                    {/* Webhooks */}
                    <div className="glass-card rounded-2xl p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="font-semibold">Webhooks</h3>
                            <button className="px-4 py-2 bg-[#0D2137] rounded-lg text-sm hover:bg-[#5f36074d] transition-all">Ajouter</button>
                        </div>
                        <div className="space-y-3">
                            {webhooks.map(wh => (
                                <div key={wh.id} className="flex items-center justify-between p-4 bg-[#0D2137] rounded-xl">
                                    <div>
                                        <p className="font-mono text-sm">{wh.url}</p>
                                        <div className="flex gap-2 mt-1">
                                            {wh.events.map((e, i) => <span key={i} className="text-xs px-2 py-0.5 bg-[#0D2137]/30 rounded">{e}</span>)}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className={`w-2 h-2 rounded-full ${wh.active ? 'bg-green-500' : 'bg-gray-500'}`}></span>
                                        <button className="text-sm text-gray-400 hover:text-white">Modifier</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Documentation */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="font-semibold mb-4">Documentation API</h3>
                        <div className="grid md:grid-cols-2 gap-4">
                            <div className="p-4 bg-[#0D2137] rounded-xl">
                                <h4 className="font-medium mb-2">Analyser une transaction</h4>
                                <p className="text-sm text-gray-400">POST /api/v1/analyze</p>
                                <p className="text-xs text-gray-500 mt-1">Envoyez les détails d'une transaction pour obtenir le score de risque.</p>
                            </div>
                            <div className="p-4 bg-[#0D2137] rounded-xl">
                                <h4 className="font-medium mb-2">Liste des événements</h4>
                                <p className="text-sm text-gray-400">transaction.blocked, alert.created, ...</p>
                                <p className="text-xs text-gray-500 mt-1">Événements disponibles pour les webhooks.</p>
                            </div>
                        </div>
                        <button className="mt-4 px-4 py-2 border border-[#0D2137] rounded-lg text-sm hover:bg-[#0D2137] transition-all">Voir documentation complète →</button>
                    </div>
                    
                    {/* About */}
                    <div className="glass-card rounded-2xl p-6">
                        <h3 className="font-semibold mb-4">À propos</h3>
                        <p className="text-sm text-gray-400 mb-2">PayShield Bank — Système de détection de fraude par IA</p>
                        <p className="text-sm text-gray-400">Prototype développé par: Ilyas Oulmidi, Bilal El Haoudar, Ahmed Nahri, Anas Hamri</p>
                        <p className="text-sm text-gray-400">Classe: G1 4IASD — EMSI</p>
                    </div>
                </div>
            );
        };
        
        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [transactions, setTransactions] = useState(() => generateInitialData(50));
            
            useEffect(() => {
                const interval = setInterval(() => {
                    if (Math.random() > 0.5) {
                        setTransactions(prev => {
                            const newTx = generateTransaction();
                            return [newTx, ...prev.slice(0, 99)];
                        });
                    }
                }, 5000);
                
                return () => clearInterval(interval);
            }, []);
            
            const renderView = () => {
                switch (currentView) {
                    case 'dashboard': return <DashboardView transactions={transactions} />;
                    case 'transactions': return <TransactionsView transactions={transactions} setTransactions={setTransactions} />;
                    case 'analyser': return <AnalyserView />;
                    case 'alertes': return <AlertsView transactions={transactions} />;
                    case 'billing': return <BillingView />;
                    case 'api': return <APIView />;
                    default: return <DashboardView transactions={transactions} />;
                }
            };
            
            return (
                <div className="min-h-screen bg-grid">
                    <div className="bg-glow"></div>
                    <NeuralNetwork />
                    
                    <Sidebar currentView={currentView} setCurrentView={setCurrentView} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} />
                    
                    <main className="md:ml-64 p-4 md:p-8 relative z-10">
                        {renderView()}
                    </main>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
